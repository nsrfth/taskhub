services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      UPLOAD_DIR: ${UPLOAD_DIR}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW}
      MASTER_KEY: ${MASTER_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      UPDATE_CHECK_ENABLED: ${UPDATE_CHECK_ENABLED}
      UPDATE_CHECK_CACHE_HOURS: ${UPDATE_CHECK_CACHE_HOURS}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "4000"

  frontend-build:
    build:
      # v1.10.1: context is the repo root so the build can see
      # USER_MANUAL.md (consumed by frontend/scripts/copy-manual.mjs as a
      # prebuild step). Dockerfile paths reference frontend/ explicitly.
      context: .
      dockerfile: ./docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    # One-shot build; output is copied to the shared volume below.
    command: ["sh", "-c", "cp -r /app/dist/. /export/ && echo build complete"]
    volumes:
      - frontend_dist:/export

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    environment:
      SITE_HOST: ${SITE_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config

  # Local OpenLDAP for development + the LDAP integration test. Gated by the
  # `ldap` profile so a plain `docker compose up` doesn't start it.
  # Bring it up explicitly with: docker compose --profile ldap up -d openldap
  openldap:
    image: osixia/openldap:1.5.0
    profiles: ['ldap']
    environment:
      LDAP_ORGANISATION: TaskHub
      # Auto-derives baseDN = dc=taskhub,dc=local.
      LDAP_DOMAIN: taskhub.local
      LDAP_ADMIN_PASSWORD: adminpass
    # No LDIF mount — the integration test seeds entries via ldapts at
    # suite start, which works for both this dev container and the
    # ephemeral CI service container. The .ldif file under docker/openldap/
    # is kept as human-readable documentation of the expected fixture.
    ports:
      - "1389:389"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  frontend_dist:
  caddy_data:
  caddy_config:
